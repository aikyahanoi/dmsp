<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CATALOGUE AIKYA</title>

<style>
body {
  font-family: Arial;
  background: #eef2f5;
  margin: 0;
  padding: 8px;
}

/* ===== HEADER ===== */
.header-new {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(to right, #ffffff, #fff5f5);
  padding: 12px;
  border-radius: 12px;
  border-bottom: 3px solid #d32f2f;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  margin-bottom: 12px;
  text-align: center;
}

.header-left img {
  height: 45px;
}

.main-title {
  font-size: 20px;
  font-weight: bold;
  color: #d32f2f;
  margin: 6px 0;
}

.stats-inline {
  font-size: 14px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

#search {
  width: 90%;
  max-width: 400px;
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 25px;
  border: 1px solid #ddd;
  font-size: 16px;
  outline: none;
}

/* ===== CARD ===== */
.card {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 16px;
  padding: 12px;
  margin-bottom: 12px;

  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  border: 1px solid rgba(255,255,255,0.4);

  display: flex;
  gap: 12px;
  align-items: center;

  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.18);
}

/* ảnh */
.card img {
  width: 150px;
  height: 150px;
  object-fit: contain;

  display: block;
  margin: auto; /* 🔥 căn giữa dọc */

  background: #fff;
  border-radius: 10px;
  border: 1px solid #eee;
}

/* nội dung */
.card-content {
  flex: 1;
}

/* tên SP */
.card-title {
  font-weight: bold;
  color: #c62828;
  font-size: 15px;
}

/* dòng info */
.row {
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px dashed #eee;
}

.row:last-child {
  border-bottom: none;
}

/* badge */
.km {
  background: #c8e6c9;
  padding: 2px 4px;
  border-radius: 4px;
}

.out-date {
  background: #ffcdd2;
  color: #b71c1c;
  padding: 2px 4px;
  border-radius: 4px;
  .low {
  color: #ff9800;
  font-weight: bold;
}
}

/* ===== GLASS CARD XỊN ===== */

body {
  background: linear-gradient(135deg, #f1f4f9, #e3ecf5);
}

/* GRID 2 CỘT (nếu đang dùng) */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* CARD KÍNH */
.card {
  /* nền kính + gradient */
  background: linear-gradient(
      135deg,
      rgba(255,255,255,0.65),
      rgba(255,255,255,0.25)
    ),
    linear-gradient(
      120deg,
      rgba(211,47,47,0.25),
      rgba(255,255,255,0.1)
    );

  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  border-radius: 18px;
  padding: 12px;

  border: 1px solid rgba(255,255,255,0.5);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.12),
    inset 0 1px 0 rgba(255,255,255,0.7);

  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;

  position: relative;
  overflow: hidden;

  transition: all 0.3s ease;
}

/* viền ánh sáng gradient */
.card::before {
  content: "";
  position: absolute;
  inset: 0;

  border-radius: 18px;
  padding: 1px;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.9),
    rgba(211,47,47,0.4),
    rgba(255,255,255,0.9)
  );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
}

/* hover xịn hơn */
.card:hover {
  transform: translateY(-5px) scale(1.03);

  box-shadow:
    0 14px 45px rgba(0,0,0,0.2),
    0 0 20px rgba(211,47,47,0.2),
    inset 0 1px 0 rgba(255,255,255,0.8);
}

/* hover nổi lên */
.card:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow:
    0 12px 40px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.8);
}

/* ẢNH */
.card img {
  width: 95px;
  height: 95px;
  object-fit: contain;

  margin-bottom: 8px;

  background: rgba(255,255,255,0.8);
  border-radius: 12px;
  padding: 6px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* TITLE */
.card-title {
  font-weight: 700;
  color: #c62828;
  font-size: 14px;
  margin-bottom: 4px;
}

/* TEXT */
.row {
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px dashed rgba(0,0,0,0.08);
}

.row:last-child {
  border-bottom: none;
}

/* THÀNH PHẦN */
.tp {
  color: #607d8b;
  font-style: italic;
}

/* KM */
.km {
  color: #2e7d32;
  font-weight: 600;
}

/* HẾT HÀNG */
.out-date {
  background: rgba(244,67,54,0.15);
  color: #c62828;
  padding: 2px 6px;
  border-radius: 6px;
}

/* SẮP HẾT */
.low {
  color: #ff6f00;
  font-weight: 800;
}  
  
</style>
</head>

<body>

<div class="header-new">
  <div class="header-left">
    <img src="https://res.cloudinary.com/doqoe08te/image/upload/v1774605551/Thi%E1%BA%BFt_k%E1%BA%BF_ch%C6%B0a_c%C3%B3_t%C3%AAn_3_oodi7d.png">
  </div>

  <div class="main-title">DANH MỤC SẢN PHẨM AIKYA 2026</div>

  <div class="stats-inline">
    <span>Tổng: <b id="total">0</b></span>
    <span>Sắp hết: <b id="low">0</b></span>
    <span>Hết: <b id="out">0</b></span>
  </div>

  <input id="search" placeholder="🔍 Tìm sản phẩm">
</div>

<div id="data">Loading...</div>

<script>
const API = "https://api.sheetbest.com/sheets/9ffe2985-c1cb-49a6-beed-5bec9ff6e4a6";
let list = [];

function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "")
    .trim();
}

function findKey(obj, keyword) {
  return Object.keys(obj).find(k =>
    normalize(k).includes(normalize(keyword))
  );
}

async function loadData() {
  const res = await fetch(API);
  list = await res.json();
  render(list);
}

function render(arr) {

  arr.sort((a, b) => {

  let dateA = String(a[findKey(a,"DATE")] || "").toLowerCase();
  let dateB = String(b[findKey(b,"DATE")] || "").toLowerCase();

  let isOutA = dateA.includes("hết");
  let isOutB = dateB.includes("hết");

  if (isOutA && !isOutB) return 1;
  if (!isOutA && isOutB) return -1;

  return 0;
});

  let html = "";

  let total = 0, low = 0, out = 0;

  arr.forEach(r => {

    let sp = r[findKey(r,"SẢN PHẨM")] || "";
    let tp = r[findKey(r,"THÀNH PHẦN")] || "";
    let vat = r[findKey(r,"VAT")] || "";
    let km = r[findKey(r,"KM NỀN")] || "";
    let don = r[findKey(r,"HÓA ĐƠN")] || "";
    let cuoi = r[findKey(r,"CUỐI")] || "";
    let km2 = r[findKey(r,"KM THÁNG")] || "";
    let date = r[findKey(r,"DATE")] || "";
    let ton = parseInt((r[findKey(r,"TỒN")]||"").replace(/[^\d]/g,""))||0;
    let img = r["HÌNH ẢNH"] || "";

    total++;
    if(ton===0) out++;
    else if(ton<50) low++;

    html += `
  <div class="card">
    <img src="${img}" onerror="this.src='https://via.placeholder.com/100'">

    <div class="card-content">
      <div class="card-title">${sp}</div>

      <div class="row">${tp}</div>

      <div class="row">Nguyên giá có VAT: ${vat}</div>

      <div class="row">KM nền: ${km}</div>

      <div class="row">Giá trên HĐ: ${don}</div>

      <div class="row">Giá cuối: <b>${cuoi}</b></div>

      ${km2 ? `<div class="row">KM tháng: <span class="km">${km2}</span></div>` : ""}

      <div class="row ${date.toLowerCase().includes("hết") ? "out-date":""}">
  HSD: ${date}
  ${ton > 0 && ton < 50 ? `<span class="low"> • Số lượng ít</span>` : ""}
</div>
        </div>
      </div>
    `;
  });

  document.getElementById("data").innerHTML = html;

  document.getElementById("total").innerText = total;
  document.getElementById("low").innerText = low;
  document.getElementById("out").innerText = out;
}

/* SEARCH CHỈ CỘT SẢN PHẨM */
document.getElementById("search").addEventListener("input", function() {

  let keyword = this.value.toLowerCase();

  let filtered = list.filter(r => {
    let sp = r[findKey(r,"SẢN PHẨM")] || "";
    return sp.toLowerCase().includes(keyword);
  });

  render(filtered);
});

loadData();
</script>

</body>
</html>
