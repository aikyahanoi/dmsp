<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANH MỤC AIKYA</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 10px 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.header img {
  height: 50px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.stats {
  font-size: 14px;
  margin-top: 5px;
}

.search {
  padding: 6px 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* TABLE */
.table-wrap {
  padding: 10px;
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  width: 100%;
  background: white;
}

th {
  background: #1976d2;
  color: white;
  padding: 8px;
  font-size: 13px;
}

td {
  padding: 6px;
  font-size: 13px;
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #f1f7ff;
}

/* SPECIAL */
.low {
  background: #ffe0b2;
  color: #e65100;
  font-weight: bold;
}

.out {
  color: red;
  font-weight: bold;
}

.km {
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://res.cloudinary.com/doqoe08te/image/upload/v1774605551/Thi%E1%BA%BFt_k%E1%BA%BF_ch%C6%B0a_c%C3%B3_t%C3%AAn_3_oodi7d.png">

  <div>
    <div class="title">DANH MỤC SẢN PHẨM AIKYA 2026</div>
    <div class="stats">
      Tổng: <b id="total">0</b> |
      Sắp hết: <b id="low">0</b> |
      Hết hàng: <b id="out">0</b>
    </div>
  </div>

  <input class="search" id="search" placeholder="🔍 Tìm sản phẩm">
</div>

<div class="table-wrap">
  <div id="data">Loading...</div>
</div>

<script>
const API = "https://api.sheetbest.com/sheets/fb7dadb5-bfc1-4845-891f-f2c25204ac27";

let list = [];

async function loadData() {
  const res = await fetch(API);
  list = await res.json();
  render(list);
}

function render(arr) {
  if (arr.length === 0) return;

  const columns = [
    "STT",
    "SẢN PHẨM",
    "HOẠT CHẤT",
    "NGUYÊN GIÁ",
    "NGUYÊN GIÁ CÓ VAT",
    "KM NỀN",
    "NHÓM LƯƠNG",
    "TRÊN HÓA ĐƠN",
    "GIÁ CUỐI",
    "KM THÁNG",
    "DATE",
    "TỒN KHO (HỘP)"
  ];

  let html = "<table><tr>";
  columns.forEach(col => html += `<th>${col}</th>`);
  html += "</tr>";

  arr.forEach(r => {
    html += "<tr>";

    columns.forEach(col => {
      let val = (r[col] ?? "").toString().trim();

      if (col === "KM THÁNG") {
        html += val ? `<td class="km">${val}</td>` : `<td></td>`;
      }

      else if (col === "DATE") {
        if (val.toLowerCase().includes("hết")) {
          html += `<td class="out">Hết hàng</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }

      else if (col === "TỒN KHO (HỘP)") {
        let num = parseInt(val.replace(/[^\d]/g, "")) || 0;

        if (num === 0) html += `<td class="out">0</td>`;
        else if (num < 50) html += `<td class="low">${num}</td>`;
        else html += `<td>${num}</td>`;
      }

      else {
        html += `<td>${val}</td>`;
      }
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("data").innerHTML = html;
  updateStats();
}

document.getElementById("search").addEventListener("input", function() {
  let keyword = this.value.toLowerCase();

  let filtered = list.filter(r =>
    (r["SẢN PHẨM"] || "").toLowerCase().includes(keyword)
  );

  render(filtered);
});

function updateStats() {
  let rows = document.querySelectorAll("table tr");

  let total = 0, low = 0, out = 0;

  rows.forEach((row, i) => {
    if (i === 0) return;

    let cell = row.cells[11];
    if (!cell) return;

    let val = parseInt(cell.innerText) || 0;

    total++;
    if (val === 0) out++;
    else if (val < 50) low++;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("low").innerText = low;
  document.getElementById("out").innerText = out;
}

loadData();
</script>

</body>
</html>
