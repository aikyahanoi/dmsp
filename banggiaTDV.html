<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BANG GIA TDV</title>

<style>
body {
  font-family: Arial;
  background: #eef2f5;
  margin: 0;
  padding: 8px;
}

/* HEADER */
.header-new {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  background: linear-gradient(to right, #ffffff, #fff5f5);
  padding: 10px 15px;
  border-radius: 12px;
  border-bottom: 3px solid #d32f2f;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  margin-bottom: 12px;
}

.header-left img { height: 45px; }

.main-title {
  font-size: 18px;
  font-weight: bold;
  color: #d32f2f;
}

.stats-inline {
  font-size: 13px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.header-right #search {
  width: 320px;
  max-width: 100%;
  padding: 10px 16px;
  border-radius: 25px;
  border: 2px solid #ddd;
  font-size: 14px;
  outline: none;
  transition: 0.25s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.header-right #search:focus {
  border-color: #d32f2f;
  box-shadow: 0 0 10px rgba(211,47,47,0.4);
}

/* TABLE */
.table-wrap {
  background: #fff;
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  overflow-x: auto;
}

/* 🔥 QUAN TRỌNG */
table {
  border-collapse: collapse;
  width: 100%;
}

/* HEADER */
th {
  background: linear-gradient(to right, #d32f2f, #b71c1c);
  color: white;
  padding: 8px;
  font-size: 14px;
  position: sticky;
  top: 0;
}

/* CELL */
td {
  padding: 6px;
  font-size: 14px;
  border-bottom: 1px solid #eee;
  text-align: center;
  color: #333;
}

/* 👉 CỘT 2,3 FIX CỨNG */
th:nth-child(2),
td:nth-child(2) {
  width: 150px;
}

th:nth-child(3),
td:nth-child(3) {
  width: 160px;
}

/* 👉 CHO TEXT XUỐNG DÒNG */
td:nth-child(2),
td:nth-child(3) {
  text-align: left;
  white-space: normal;
  overflow-wrap: anywhere;
  line-height: 1.4;
}

/* STYLE */
.out-date {
  background: #ffcdd2;
  color: #b71c1c;
  font-weight: bold;
}

.km {
  background: #c8e6c9;
}

/* HOVER */
tbody tr:nth-child(even) {
  background: #fafafa;
}

tbody tr:hover {
  background: #fff;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  transition: 0.2s;
}

/* BORDER */
td {
  border-right: 1px solid #f0f0f0;
}

td:last-child {
  border-right: none;
}
</style>
</head>

<body>

<div class="header-new">
  <div class="header-left">
    <img src="https://res.cloudinary.com/doqoe08te/image/upload/v1774605551/Thi%E1%BA%BFt_k%E1%BA%BF_ch%C6%B0a_c%C3%B3_t%C3%AAn_3_oodi7d.png">
  </div>

  <div class="header-center">
    <div class="main-title">DANH MỤC SẢN PHẨM AIKYA 2026</div>
    <div class="stats-inline">
      <span>Tổng SP: <b id="total">0</b></span>
      <span>Sắp hết (&lt;50): <b id="low">0</b></span>
      <span>Hết hàng: <b id="out">0</b></span>
    </div>
  </div>

  <div class="header-right">
    <input id="search" placeholder="🔍 Tìm sản phẩm">
  </div>
</div>

<div class="table-wrap">
  <div id="data">Loading...</div>
</div>

<script>
const API = "https://api.sheetbest.com/sheets/fb7dadb5-bfc1-4845-891f-f2c25204ac27";
let list = [];

/* chuẩn hóa key */
function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "")
    .trim();
}

function findKey(obj, keyword) {
  return Object.keys(obj).find(k =>
    normalize(k).includes(normalize(keyword))
  );
}

/* LOAD */
async function loadData() {
  try {
    const res = await fetch(API);
    list = await res.json();
    render(list);
  } catch {
    document.getElementById("data").innerHTML = "Lỗi load dữ liệu";
  }
}

/* RENDER */
function render(arr) {

  if (!arr.length) {
    document.getElementById("data").innerHTML = "Không có dữ liệu";
    return;
  }

  let keyMap = [
    "STT","SẢN PHẨM","THÀNH PHẦN","NGUYÊN GIÁ",
    "NGUYÊN GIÁ CÓ VAT","KM NỀN","NHÓM LƯƠNG",
    "TRÊN HÓA ĐƠN","GIÁ CUỐI","KM THÁNG","DATE","TỒN KHO"
  ];

  let html = "<table><thead><tr>";

  keyMap.forEach(k => html += `<th>${k}</th>`);

  html += "</tr></thead><tbody>";

  arr.forEach(r => {
    html += "<tr>";

    keyMap.forEach(key => {
      let rawKey = findKey(r, key);
      let val = rawKey ? r[rawKey] : "";
      val = String(val || "").trim();

      if (key === "KM THÁNG") {
        html += val ? `<td class="km">${val}</td>` : `<td></td>`;
      }
      else if (key === "DATE") {
        html += val.toLowerCase().includes("hết")
          ? `<td class="out-date">Hết hàng</td>`
          : `<td>${val}</td>`;
      }
      else if (key === "TỒN KHO") {
        let num = parseInt(val.replace(/[^\d]/g, "")) || 0;
        html += num < 50 && num > 0
          ? `<td style="background:#ffe0b2">${num}</td>`
          : `<td>${num || ""}</td>`;
      }
      else {
        html += `<td>${val}</td>`;
      }
    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  document.getElementById("data").innerHTML = html;
  updateStats();
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
  let k = this.value.toLowerCase();
  render(list.filter(r => JSON.stringify(r).toLowerCase().includes(k)));
});

/* STATS */
function updateStats() {
  let rows = document.querySelectorAll("tbody tr");
  let total = rows.length, low = 0, out = 0;

  rows.forEach(row => {
    let val = parseInt(row.cells[11]?.innerText) || 0;
    if (val === 0) out++;
    else if (val < 50) low++;
  });

  total = total || 0;
  document.getElementById("total").innerText = total;
  document.getElementById("low").innerText = low;
  document.getElementById("out").innerText = out;
}

loadData();
</script>

</body>
</html>
