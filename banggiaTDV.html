<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANH MỤC AIKYA</title>

<style>

body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
  padding: 8px;
}

/* HEADER */
.header-new {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.main-title {
  font-size: 20px;
  font-weight: bold;
}

.stats-inline span {
  margin-right: 15px;
  font-size: 14px;
}

/* SEARCH */
#search {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* TABLE */
.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 8px;
  border: 1px solid #ddd;
  font-size: 13px;
  text-align: left;
}

th {
  background: #1976d2;
  color: white;
}

/* STYLE */
.km {
  background: #e3f2fd;
  color: #1565c0;
  font-weight: bold;
}

.out-date {
  color: red;
  font-weight: bold;
}

.low-stock {
  background:#ffe0b2;
  color:#e65100;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header-new">

  <div>
    <div class="main-title">DANH MỤC SẢN PHẨM AIKYA 2026</div>

    <div class="stats-inline">
      <span>Tổng SP: <b id="total">0</b></span>
      <span>Sắp hết (&lt;50): <b id="low">0</b></span>
      <span>Hết hàng: <b id="out">0</b></span>
    </div>
  </div>

  <div>
    <input id="search" placeholder="🔍 Tìm sản phẩm">
  </div>

</div>

<div class="table-wrap">
  <div id="data">Loading...</div>
</div>

<script>

const API = "https://api.sheetbest.com/sheets/fb7dadb5-bfc1-4845-891f-f2c25204ac27";

let list = [];

/* LOAD DATA */
async function loadData() {
  const res = await fetch(API);
  list = await res.json();
  render(list);
}

/* ===== LẤY GIÁ TRỊ (CHỐNG LỖI SPACE) ===== */
function getVal(obj, key) {
  let found = Object.keys(obj).find(k =>
    k.replace(/\s/g, "").toLowerCase() === key.replace(/\s/g, "").toLowerCase()
  );
  return found ? obj[found] : "";
}

/* RENDER */
function render(arr) {

  if (arr.length === 0) return;

  const columns = [
    "STT",
    "SẢN PHẨM",
    "THÀNH PHẦN",
    "NGUYÊN GIÁ",
    "NGUYÊN GIÁ CÓ VAT",
    "KM NỀN",
    "NHÓM LƯƠNG",
    "TRÊN HÓA ĐƠN",
    "GIÁ CUỐI",
    "KM THÁNG",
    "DATE",
    "TỒN KHO (HỘP)"
  ];

  let html = "<table><tr>";

  columns.forEach(col => {
    html += `<th>${col}</th>`;
  });

  html += "</tr>";

  arr.forEach(r => {
    html += "<tr>";

    columns.forEach(col => {

      let val = getVal(r, col);
      if (val === null) val = "";
      val = val.toString().trim();

      /* KM THÁNG */
      if (col === "KM THÁNG") {
        html += val ? `<td class="km">${val}</td>` : `<td></td>`;
      }

      /* DATE */
      else if (col === "DATE") {
        if (val.toLowerCase().includes("hết")) {
          html += `<td class="out-date">Hết hàng</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }

      /* TỒN KHO */
      else if (col === "TỒN KHO (HỘP)") {

        let num = parseInt(val) || 0;

        if (num === 0) {
          html += `<td></td>`;
        }
        else if (num < 50) {
          html += `<td class="low-stock">${num}</td>`;
        }
        else {
          html += `<td>${num}</td>`;
        }
      }

      else {
        html += `<td>${val}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("data").innerHTML = html;

  updateStats();
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
  let keyword = this.value.toLowerCase();

  let filtered = list.filter(r =>
    (getVal(r, "SẢN PHẨM") || "").toLowerCase().includes(keyword)
  );

  render(filtered);
});

/* STATS */
function updateStats() {

  let rows = document.querySelectorAll("table tr");

  let total = 0;
  let low = 0;
  let out = 0;

  rows.forEach((row, index) => {

    if (index === 0) return;

    let cell = row.cells[11]; // cột tồn kho

    if (!cell) return;

    let val = parseInt(cell.innerText) || 0;

    total++;

    if (val === 0) out++;
    else if (val < 50) low++;

  });

  document.getElementById("total").innerText = total;
  document.getElementById("low").innerText = low;
  document.getElementById("out").innerText = out;
}

/* INIT */
loadData();

</script>

</body>
</html>
