<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6">

<title>BANG GIA TDV</title>

<style>
body {
  font-family: Arial;
  background: #eef2f5;
  margin: 0;
  padding: 8px;
}

/* HEADER */
.header-new {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  background: linear-gradient(to right, #ffffff, #fff5f5);
  padding: 10px 15px;
  border-radius: 12px;
  border-bottom: 3px solid #d32f2f;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  margin-bottom: 12px;
}

.header-left img {
  height: 45px;
}

.header-center {
  text-align: center;
}

.main-title {
  font-size: 18px;
  font-weight: bold;
  color: #d32f2f;
}

.stats-inline {
  font-size: 13px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.header-right #search {
  width: 320px;
  max-width: 100%;
  padding: 10px 16px;
  border-radius: 25px;
  border: 2px solid #ddd;
  font-size: 14px;
  outline: none;
  transition: all 0.25s ease;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.header-right #search:focus {
  border-color: #d32f2f;
  box-shadow: 0 0 10px rgba(211,47,47,0.4);
}

.header-right #search:hover {
  border-color: #d32f2f;
}

/* TABLE */
.table-wrap {
  background: white;
  border-radius: 14px;
  padding: 8px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th {
  background: linear-gradient(to right, #d32f2f, #b71c1c);
  color: white;
  padding: 8px;
  font-size: 14px;
  position: sticky;
  top: 0;
}

td {
  padding: 6px;
  font-size: 14px;
  border-bottom: 1px solid #eee;
  text-align: center;
  color: #333;
}

/* cột 2 3 */
td:nth-child(2),
td:nth-child(3) {
  text-align: left;
  white-space: normal;
  word-break: break-word;
}

/* hiệu ứng */
tbody tr:nth-child(even) {
  background: #fafafa;
}

tbody tr:hover {
  background: #fff;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.12);
}

/* đặc biệt */
.out-date {
  background: #ffcdd2;
  color: #b71c1c;
  font-weight: bold;
}

.km {
  background: #c8e6c9;
}

/* ===== MOBILE CHUẨN ===== */

@media screen and (max-width: 768px) {

  /* ===== HEADER ===== */
  body {
    overflow-x: hidden;
  }

  .header-new {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .header-center {
    flex: 1;
    text-align: center;
  }

  .main-title {
    font-size: 20px;
  }

  .stats-inline {
    font-size: 13px;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .header-right {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }

  .header-right #search {
    width: 90%;
  }

  /* ===== TABLE ===== */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: max-content;
    min-width: 100%;
  }

  th, td {
    font-size: 11px;
    padding: 5px;
    white-space: normal;
    word-break: break-word;
  }

  /* ===== CHỈNH TOÀN BỘ CỘT ===== */
  th:nth-child(1), td:nth-child(1) { width: 20px; }
  th:nth-child(2), td:nth-child(2) { width: 110px; }
  th:nth-child(3), td:nth-child(3) { width: 110px; }
  th:nth-child(4), td:nth-child(4) { width: 50px; }
  th:nth-child(5), td:nth-child(5) { width: 60px; }
  th:nth-child(6), td:nth-child(6) { width: 45px; }
  th:nth-child(7), td:nth-child(7) { width: 45px; }
  th:nth-child(8), td:nth-child(8) { width: 40px; }
  th:nth-child(9), td:nth-child(9) { width: 40px; }
  th:nth-child(10), td:nth-child(10) { width: 70px; }
  th:nth-child(11), td:nth-child(11) { width: 60px; }
  th:nth-child(12), td:nth-child(12) { width: 30px; }

}
  @media screen and (max-width: 768px) {
  #search {
    font-size: 16px !important;
  }
}
</style>
</head>

<body>

<div class="header-new">
  <div class="header-left">
    <img src="https://res.cloudinary.com/doqoe08te/image/upload/v1774605551/Thi%E1%BA%BFt_k%E1%BA%BF_ch%C6%B0a_c%C3%B3_t%C3%AAn_3_oodi7d.png">
  </div>

  <div class="header-center">
    <div class="main-title">DANH MỤC SẢN PHẨM AIKYA 2026</div>
    <div class="stats-inline">
      <span>Tổng SP: <b id="total">0</b></span>
      <span>Sắp hết (&lt;50): <b id="low">0</b></span>
      <span>Hết hàng: <b id="out">0</b></span>
    </div>
  </div>

  <div class="header-right">
    <input id="search" placeholder="🔍 Tìm sản phẩm">
  </div>
</div>

<div class="table-wrap">
  <div id="data">Loading...</div>
</div>

<script>
const API = "https://api.sheetbest.com/sheets/fb7dadb5-bfc1-4845-891f-f2c25204ac27";
let list = [];

function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "")
    .trim();
}

function findKey(obj, keyword) {
  return Object.keys(obj).find(k =>
    normalize(k).includes(normalize(keyword))
  );
}

async function loadData() {
  try {
    const res = await fetch(API);
    list = await res.json();
    render(list);
  } catch {
    document.getElementById("data").innerHTML = "Lỗi load dữ liệu";
  }
}

function render(arr) {

  if (!arr || arr.length === 0) {
    document.getElementById("data").innerHTML = "Không có dữ liệu";
    return;
  }

  let keyMap = {
    stt: "STT",
    sp: "SẢN PHẨM",
    tp: "THÀNH PHẦN",
    gia: "NGUYÊN GIÁ",
    vat: "NGUYÊN GIÁ CÓ VAT",
    km: "KM NỀN",
    luong: "NHÓM LƯƠNG",
    don: "TRÊN HÓA ĐƠN",
    cuoi: "GIÁ CUỐI",
    km2: "KM THÁNG",
    date: "DATE",
    ton: "TỒN KHO"
  };

  let html = "<table><thead><tr>";

  Object.values(keyMap).forEach(k => {
    html += `<th>${k}</th>`;
  });

  html += "</tr></thead><tbody>";

  arr.forEach(r => {
    html += "<tr>";

    Object.entries(keyMap).forEach(([type, key]) => {

      let rawKey = findKey(r, key);
      let val = rawKey ? r[rawKey] : "";
      val = String(val || "").trim();

      if (type === "km2") {
        html += val ? `<td class="km">${val}</td>` : `<td></td>`;
      }
      else if (type === "date") {
        if (val.toLowerCase().includes("hết")) {
          html += `<td class="out-date">Hết hàng</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }
      else if (type === "ton") {
        let num = parseInt(val.replace(/[^\d]/g, "")) || 0;

        if (num === 0) html += `<td></td>`;
        else if (num < 50) html += `<td style="background:#ffe0b2">${num}</td>`;
        else html += `<td>${num}</td>`;
      }
      else {
        html += `<td>${val}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  document.getElementById("data").innerHTML = html;
  updateStats();
}

document.getElementById("search").addEventListener("input", function() {
  let keyword = this.value.toLowerCase();

  let filtered = list.filter(r => {

    // tìm đúng cột SẢN PHẨM (cột 2)
    let keySP = findKey(r, "SẢN PHẨM");

    let value = keySP ? r[keySP] : "";

    return String(value).toLowerCase().includes(keyword);
  });

  render(filtered);
});

function updateStats() {
  let rows = document.querySelectorAll("table tr");
  let total = rows.length - 1;
  let low = 0;
  let out = 0;

  rows.forEach((row, i) => {
    if (i === 0) return;
    let val = parseInt(row.cells[11]?.innerText) || 0;
    if (val === 0) out++;
    else if (val < 50) low++;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("low").innerText = low;
  document.getElementById("out").innerText = out;
}

loadData();
</script>

</body>
</html>
