<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH MỤC SẢN PHẨM AIKYA 2026</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
  padding: 12px;
}

h1 {
  text-align: center;
  color: #d32f2f;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1200px;
}

th {
  background: #d32f2f;
  color: white;
  padding: 10px;
  position: sticky;
  top: 0;
  z-index: 3;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

/* KM THÁNG */
.green {
  background: #d4edda;
}

/* TỒN KHO */
.red {
  background: #b71c1c;
  color: white;
  font-weight: bold;
}

.orange {
  background: #ffe0d6;
}

/* FREEZE CỘT */
td:nth-child(1), th:nth-child(1) {
  position: sticky;
  left: 0;
  background: white;
  z-index: 2;
  min-width: 60px;
}

td:nth-child(2), th:nth-child(2) {
  position: sticky;
  left: 60px;
  background: white;
  z-index: 2;
  min-width: 200px;
}

</style>
</head>

<body>

<h1>📦 DANH MỤC SẢN PHẨM AIKYA 2026</h1>

<div class="card">
  <input id="search" placeholder="🔍 Tìm sản phẩm...">
</div>

<div class="card">
  <div id="data">Đang tải...</div>
</div>

<script>

const API = "https://api.sheetbest.com/sheets/74702816-7bb3-47eb-8fbe-643ed2675b88";

let list = [];

async function loadData() {
  const res = await fetch(API);
  list = await res.json();
  render(list);
}

function render(arr) {
  if (!arr.length) return;

  let keys = [
    "STT",
    "SẢN PHẨM",
    "THÀNH PHẦN",
    "ĐƠN GIÁ CÓ VAT",
    "KM NỀN",
    "GIÁ CUỐI",
    "KM THÁNG 3",
    "DATE",
    "TỒN KHO (HỘP)",
    "Mức doanh số ở Miền Bắc",
    "Quy cách thùng"
  ];

  let html = "<table><tr>";

  keys.forEach(k => html += `<th>${k}</th>`);
  html += "</tr>";

  arr.forEach(r => {
    html += "<tr>";

    keys.forEach(k => {
      let val = r[k] || "";

      // KM THÁNG
      if (k === "KM THÁNG 3") {
        if (val.trim() !== "") {
          html += `<td class="green">${val}</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }

      // TỒN KHO
      else if (k === "TỒN KHO (HỘP)") {
        let num = parseInt(String(val).replace(/[^0-9]/g, "")) || 0;

        if (num === 0) {
          html += `<td class="red">Hết hàng</td>`;
        } else if (num < 50) {
          html += `<td class="orange">${num}</td>`;
        } else {
          html += `<td>${num}</td>`;
        }
      }

      else {
        html += `<td>${val}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</table>";
  document.getElementById("data").innerHTML = html;
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  let key = this.value.toLowerCase();

  let filtered = list.filter(r =>
    Object.values(r).some(v =>
      String(v).toLowerCase().includes(key)
    )
  );

  render(filtered);
});

loadData();

</script>

</body>
</html>
