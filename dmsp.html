<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANH MỤC AIKYA</title>

<style>

body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
  padding: 8px;
}

h1 {
  text-align: center;
  color: #d32f2f;
  font-size: 18px;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ddd;
  margin-bottom: 8px;
}

/* TABLE */
.table-wrap {
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}

th {
  background: #d32f2f;
  color: white;
  padding: 6px;
  font-size: 12px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 5;
 white-space: normal;
  word-break: break-word;
  max-width: 120px;
}

td {
 padding: 6px;
  border-bottom: 1px solid #eee;
  font-size: 12px;
  text-align: center;
  white-space: normal;
  word-break: break-word;
  max-width: 120px;
}

/* CĂN TRÁI + GIÃN DÒNG */
td:nth-child(2),
td:nth-child(3) {
  text-align: left;
  white-space: normal;
  line-height: 1.4;
}

/* STYLE */
.out-date {
  background: #ffcdd2;
  color: #b71c1c;
  font-weight: bold;
}

.star {
  color: #ffb300;
  font-size: 14px;
}

/* KM THÁNG 3 */
.km {
  background: #c8e6c9;
}

</style>
</head>

<body>

<h1>📦 DANH MỤC SẢN PHẨM AIKYA 2026</h1>

<input id="search" placeholder="🔍 Tìm sản phẩm...">

<div class="table-wrap">
  <div id="data">Loading...</div>
</div>

<script>

const API = "https://api.sheetbest.com/sheets/74702816-7bb3-47eb-8fbe-643ed2675b88";

let list = [];

function findKey(obj, keyword) {
  return Object.keys(obj).find(k =>
    k.toLowerCase().includes(keyword.toLowerCase())
  );
}

function cleanNumber(val) {
  return parseInt(
    String(val)
      .replace(/\./g, "")
      .replace(/[^0-9]/g, "")
  ) || 0;
}

async function loadData() {
  const res = await fetch(API);
  list = await res.json();
  render(list);
}

function render(arr) {

  if (arr.length === 0) return;

  let sample = arr[0];

  let keyMap = {
    stt: findKey(sample, "stt"),
    sp: findKey(sample, "sản"),
    tp: findKey(sample, "thành"),
    gia: findKey(sample, "giá"),
    km: findKey(sample, "km"),          // KM nền (không tô màu)
    km2: "KM THÁNG 3",                  // KM cần tô xanh
    date: findKey(sample, "date"),
    ton: "TỒN KHO (HỘP)",               // FIX CỨNG
    sao: "Mức doanh số ở Miền Bắc",     // FIX CỨNG
    qc: findKey(sample, "quy cách")
  };

  let html = "<table><tr>";

  Object.values(keyMap).forEach(k => {
    html += `<th>${k}</th>`;
  });

  html += "</tr>";

  arr.forEach(r => {
    html += "<tr>";

    Object.entries(keyMap).forEach(([type, key]) => {

      let raw = r[key];
      let val = (raw ?? "").toString().trim();

      /* KM nền (KHÔNG màu) */
      if (type === "km") {
        html += `<td>${val}</td>`;
      }

      /* KM THÁNG 3 (CÓ MÀU) */
      else if (type === "km2") {
        html += val ? `<td class="km">${val}</td>` : `<td></td>`;
      }

      /* DATE */
      else if (type === "date") {
        if (val.toLowerCase().includes("hết")) {
          html += `<td class="out-date">Hết hàng</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }

      /* TỒN KHO (CHỈ HIỆN SỐ – KHÔNG MÀU) */
else if (type === "ton") {

  let tonKey = Object.keys(r).find(k =>
    k.toLowerCase().includes("tồn") &&
    k.toLowerCase().includes("kho")
  );

  let rawTon = tonKey ? r[tonKey] : "";

  let num = parseInt(
    String(rawTon).replace(/[^\d]/g, "")
  ) || 0;

  if (num === 0) {
    html += `<td></td>`;   // không hiển thị gì
  }
  else if (num < 50) {
    html += `<td class="low-stock">${num}</td>`;
  }
  else {
    html += `<td>${num}</td>`;
  }
}
      /* SAO */
      else if (type === "sao") {

        if (!val) {
          html += `<td>-</td>`;
        }
        else {
          let stars = "";

          if (val.includes("*")) {
            stars = val.replace(/\*/g, "⭐");
          }
          else if (!isNaN(parseInt(val))) {
            stars = "⭐".repeat(parseInt(val));
          }
          else {
            stars = val;
          }

          html += `<td class="star">${stars}</td>`;
        }
      }

      else {
        html += `<td>${val}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("data").innerHTML = html;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
  let keyword = this.value.toLowerCase();

  let filtered = list.filter(r =>
    Object.values(r).some(v =>
      String(v).toLowerCase().includes(keyword)
    )
  );

  render(filtered);
});

loadData();

</script>

</body>
</html>
