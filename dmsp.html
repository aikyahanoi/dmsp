<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANH MỤC AIKYA</title>

<style>

body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
  padding: 8px;
}

h1 {
  text-align: center;
  color: #d32f2f;
  font-size: 18px;
}

/* SEARCH */
input {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ddd;
  margin-bottom: 8px;
}

/* TABLE */
table {
  border-collapse: collapse;
  width: 100%;
}

th {
  background: #d32f2f;
  color: white;
  padding: 6px;
  font-size: 12px;
  position: sticky;
  top: 0;
  z-index: 5;
  text-align: center;
}

/* FIX HEADER */
th:nth-child(1),
th:nth-child(2) {
  position: sticky;
  background: #d32f2f !important;
  z-index: 10;
}

th:nth-child(1) { left: 0; }
th:nth-child(2) { left: 40px; }

td {
  padding: 6px;
  border-bottom: 1px solid #eee;
  font-size: 12px;
}

/* FREEZE */
td:nth-child(1) {
  position: sticky;
  left: 0;
  background: #fff;
}

td:nth-child(2) {
  position: sticky;
  left: 40px;
  background: #fff;
}

/* STYLE */
.km { background: #c8e6c9; }

.out-date {
  background: #ffcdd2;
  color: #b71c1c;
  font-weight: bold;
}

.out {
  background: #ffcdd2;
  color: #b71c1c;
}

.low {
  background: #fff3e0;
}

.star {
  color: #ffb300;
  font-size: 14px;
}

</style>
</head>

<body>

<h1>📦 DANH MỤC SẢN PHẨM AIKYA 2026</h1>

<input id="search" placeholder="🔍 Tìm sản phẩm...">

<div id="data">Loading...</div>

<script>

const API = "https://api.sheetbest.com/sheets/74702816-7bb3-47eb-8fbe-643ed2675b88";

let list = [];

// 👉 TÌM KEY GẦN ĐÚNG
function findKey(obj, keyword) {
  return Object.keys(obj).find(k =>
    k.toLowerCase().includes(keyword.toLowerCase())
  );
}

function cleanNumber(val) {
  return parseInt(
    String(val)
      .replace(/\./g, "")
      .replace(/[^0-9]/g, "")
  ) || 0;
}

async function loadData() {
  const res = await fetch(API);
  list = await res.json();
  render(list);
}

function render(arr) {

  if (arr.length === 0) return;

  // 👉 MAP KEY ĐỘNG
  let sample = arr[0];

  let keyMap = {
    stt: findKey(sample, "stt"),
    sp: findKey(sample, "sản"),
    tp: findKey(sample, "thành"),
    gia: findKey(sample, "giá"),
    km: findKey(sample, "km tháng"),
    date: findKey(sample, "date"),
    ton: findKey(sample, "tồn"),
    sao: findKey(sample, "miền bắc"),
    qc: findKey(sample, "quy cách")
  };

  let html = "<table><tr>";
  Object.values(keyMap).forEach(k => html += `<th>${k}</th>`);
  html += "</tr>";

  arr.forEach(r => {
    html += "<tr>";

    Object.entries(keyMap).forEach(([type, key]) => {

      let val = (r[key] ?? "").toString().trim();

      // KM
      if (type === "km") {
        html += val ? `<td class="km">${val}</td>` : `<td></td>`;
      }

      // DATE
      else if (type === "date") {
        if (val.toLowerCase().includes("hết")) {
          html += `<td class="out-date">Hết hàng</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }

      // TỒN KHO
      else if (type === "ton") {

        if (!val || val === "-") {
          html += `<td>-</td>`;
        }
        else if (val.toLowerCase().includes("hết")) {
          html += `<td class="out">Hết</td>`;
        }
        else {
          let num = cleanNumber(val);

          if (num === 0) {
            html += `<td class="out">0</td>`;
          }
          else if (num < 50) {
            html += `<td class="low">${num}</td>`;
          }
          else {
            html += `<td>${num}</td>`;
          }
        }
      }

      // SAO ⭐
      else if (type === "sao") {

        let stars = "";

        if (val.includes("*")) {
          stars = val.replace(/\*/g, "⭐");
        } else {
          let num = parseInt(val) || 0;
          stars = "⭐".repeat(Math.min(5, num));
        }

        html += `<td class="star">${stars}</td>`;
      }

      else {
        html += `<td>${val}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</table>";
  document.getElementById("data").innerHTML = html;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
  let keyword = this.value.toLowerCase();

  let filtered = list.filter(r =>
    Object.values(r).some(v =>
      String(v).toLowerCase().includes(keyword)
    )
  );

  render(filtered);
});

loadData();

</script>

</body>
</html>
