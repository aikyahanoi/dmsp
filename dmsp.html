<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DANH MỤC SẢN PHẨM AIKYA 2026</title>

<style>

body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
  color: #d32f2f;
  font-size: 20px;
}

/* SEARCH */
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  font-size: 16px;
}

/* TABLE */
.table-wrap {
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  min-width: 1400px;
}

/* HEADER */
th {
  background: #d32f2f;
  color: white;
  padding: 10px;
  font-size: 13px;
  position: sticky;
  top: 0;
  z-index: 5;
  text-align: center;
}

/* FIX HEADER CỘT CỐ ĐỊNH */
th:nth-child(1),
th:nth-child(2) {
  background: #d32f2f !important;
  color: white;
  z-index: 6;
}

/* CELL */
td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

/* FREEZE CỘT */
td:nth-child(1), th:nth-child(1) {
  position: sticky;
  left: 0;
  background: #fff;
  z-index: 4;
  min-width: 50px;
}

td:nth-child(2), th:nth-child(2) {
  position: sticky;
  left: 50px;
  background: #fff;
  z-index: 4;
  min-width: 200px;
}

/* KM THÁNG */
td:nth-child(7) {
  background: #c8e6c9;
}

/* TỒN KHO */
td:nth-child(9) {
  text-align: center;
  font-weight: bold;
}

.out {
  background: #b71c1c;
  color: white;
}

.low {
  background: #ffe0d6;
}

</style>
</head>

<body>

<h1>📦 DANH MỤC SẢN PHẨM AIKYA 2026</h1>

<input id="search" placeholder="🔍 Tìm sản phẩm...">

<div class="table-wrap">
  <div id="data">Đang tải...</div>
</div>

<script>

const API = "https://api.sheetbest.com/sheets/74702816-7bb3-47eb-8fbe-643ed2675b88";

let list = [];

async function loadData() {
  const res = await fetch(API);
  list = await res.json();
  render(list);
}

function render(arr) {

  let keys = [
    "STT",
    "SẢN PHẨM",
    "THÀNH PHẦN",
    "ĐƠN GIÁ CÓ VAT",
    "KM NỀN",
    "GIÁ CUỐI",
    "KM THÁNG 3",
    "DATE",
    "TỒN KHO (HỘP)",
    "Mức doanh số ở Miền Bắc",
    "Quy cách thùng"
  ];

  let html = "<table><tr>";
  keys.forEach(k => html += `<th>${k}</th>`);
  html += "</tr>";

  arr.forEach(r => {
    html += "<tr>";

    keys.forEach(k => {

      let val = r[k] ?? "";

      // ===== TỒN KHO FIX CHUẨN =====
      if (k === "TỒN KHO (HỘP)") {

        let raw = String(val).trim();

        // Nếu là dấu "-" hoặc rỗng
        if (raw === "-" || raw === "") {
          html += `<td>-</td>`;
        }

        else if (raw.toLowerCase().includes("hết")) {
          html += `<td class="out">Hết hàng</td>`;
        }

        else {

          let num = parseInt(raw.replace(/[^0-9]/g, ""));

          if (!num || num === 0) {
            html += `<td class="out">Hết hàng</td>`;
          }
          else if (num < 50) {
            html += `<td class="low">${num}</td>`;
          }
          else {
            html += `<td>${num}</td>`;
          }
        }
      }

      // ===== SAO =====
      else if (k === "Mức doanh số ở Miền Bắc") {
        let num = parseInt(val) || 0;
        let stars = "⭐".repeat(Math.min(5, Math.floor(num / 50)));
        html += `<td>${stars}</td>`;
      }

      else {
        html += `<td>${val}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("data").innerHTML = html;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {

  let keyword = this.value.toLowerCase();

  let filtered = list.filter(r =>
    Object.values(r).some(v =>
      String(v).toLowerCase().includes(keyword)
    )
  );

  render(filtered);
});

loadData();

</script>

</body>
</html>
